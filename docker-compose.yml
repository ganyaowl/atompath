name: atompath

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: atompath:latest
    container_name: atompath
    restart: unless-stopped
    init: true
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3000
      DATABASE_PATH: /app/data/database.db
    ports:
      - "127.0.0.1:3001:3000"
    volumes:
      - atompath-data:/app/data

volumes:
  atompath-data:
    name: atompath-data
