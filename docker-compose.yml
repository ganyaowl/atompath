name: atompath

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: atompath:latest
    container_name: atompath
    restart: unless-stopped
    init: true
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3000
      DATABASE_PATH: /app/data/database.db
    ports:
      - "127.0.0.1:3001:3000"
    volumes:
      - atompath-data:/app/data

  caddy:
    image: caddy:2-alpine
    container_name: atompath-caddy
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - atompath-caddy-data:/data
      - atompath-caddy-config:/config

volumes:
  atompath-data:
    name: atompath-data
  atompath-caddy-data:
    name: atompath-caddy-data
  atompath-caddy-config:
    name: atompath-caddy-config
